<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>DacTac 3D</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="DacTac 3D">
      <section class="hud" aria-label="Статус">
        <div class="scoreboard">
          <div class="score-team score-team-red" id="hudTeamRed">
            <span class="score-team-name">КРАСНЫЕ</span>
            <span class="score-num" id="scoreRed">0</span>
            <span class="score-yours" id="yoursRed">ВЫ</span>
          </div>
          <div class="score-mid">:</div>
          <div class="score-team score-team-blue" id="hudTeamBlue">
            <span class="score-yours" id="yoursBlue">ВЫ</span>
            <span class="score-num" id="scoreBlue">0</span>
            <span class="score-team-name">СИНИЕ</span>
          </div>
        </div>
        <div id="teamBadge" class="team-badge"></div>
      </section>
      <div id="pingDisplay" class="ping-display"></div>
      <canvas id="game" aria-label="3D карта"></canvas>
      <div id="preloader" class="preloader" aria-live="polite">
        <div class="preloader-bg"></div>
        <div class="preloader-content">
          <div class="preloader-logo">
            <span class="preloader-logo-dak">Dak</span><span class="preloader-logo-tak">Tak</span>
          </div>
          <div class="preloader-tagline">Командная 3D игра</div>
          <div class="preloader-spinner"><div></div><div></div><div></div><div></div></div>
          <div id="preloaderStatus" class="preloader-status">Подключение к серверу...</div>
        </div>
      </div>

      <section id="joinScreen" class="join-screen hidden" aria-label="Выбор игрока">
        <div class="join-panel">
          <div class="join-title">Выбери игрока</div>
          <div class="join-grid">
            <button class="join-button color-blue" type="button" data-join-player="blue">
              <span>1</span>
              Синий
            </button>
            <button class="join-button color-red" type="button" data-join-player="red">
              <span>2</span>
              Красный
            </button>
            <button class="join-button color-blue" type="button" data-join-player="blueTower">
              <span>3</span>
              Синий башня
            </button>
            <button class="join-button color-red" type="button" data-join-player="redTower">
              <span>4</span>
              Красный башня
            </button>
          </div>
          <div id="joinStatus" class="join-status">Подключение к серверу...</div>
        </div>
      </section>
      <div id="multiplier" class="multiplier" aria-live="polite">*2 очки</div>
      <div id="lookPad" class="look-pad" aria-label="Панель обзора"></div>
      <div id="pointerHint" class="pointer-hint">Кликни для управления мышью · Esc — выход</div>

      <section class="controls" aria-label="Управление">
        <div id="joystick" class="joystick" aria-label="Джойстик">
          <div id="stick" class="stick"></div>
        </div>
      </section>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
